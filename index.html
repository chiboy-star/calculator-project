<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Calculator</title> 
  <link href="styles.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="icon2.png" />
  <script src="script.js" defer></script>
</head>
<body>
  <main class="calculator-app">
    <div class="calculator-grid">
      <div class="output">
        <div data-previous-operand class="previous-operand"></div>
        <div data-current-operand class="current-operand"></div>
      </div>
      
      <button data-all-clear class="btn-action span-two">AC</button>
      <button data-delete class="btn-action">DEL</button>
      <button data-operation class="btn-operator">÷</button>
      
      <button data-number>7</button>
      <button data-number>8</button>
      <button data-number>9</button>
      <button data-operation class="btn-operator">×</button>
      
      <button data-number>4</button>
      <button data-number>5</button>
      <button data-number>6</button>
      <button data-operation class="btn-operator">-</button>
      
      <button data-number>1</button>
      <button data-number>2</button>
      <button data-number>3</button>
      <button data-operation class="btn-operator">+</button>
      
      <button data-special="H" class="btn-special">H</button>
      <button data-special="K" class="btn-special">K</button>
      <button data-special="M" class="btn-special">M</button>
      <button data-equals class="btn-operator">=</button>
      
      <button data-number class="span-two">0</button>
      <button data-number>.</button>
    </div>
  </main>
</body>
</html>
